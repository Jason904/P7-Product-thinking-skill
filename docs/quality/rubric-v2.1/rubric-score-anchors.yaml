version: "2.1"
purpose: "Objective per-item score anchors for Rubric v2.1. Each score is based on observable checks, not adjective-only judgment."
scoring_rule: "First mark objective_checks from source evidence. Then choose the highest score whose required_checks are all satisfied. Apply evidence caps and deductions after raw_score."

items:
  thinking.p6_to_p7_reframe:
    item_name: "P6+ 第一反应到 P7+ 问题意识"
    primary_account: thinking_depth
    level: A
    max_score: 3
    objective_checks: [p6_reaction_case_specific, p6_valid_part_explained, p6_limit_explained, p7_start_question_changes_analysis_path, downstream_effect_explained]
    score_anchors:
      0: {label: "0分", required_checks: [], failure_if: "缺少 p6_reaction_case_specific", observable_rule: "没有写出执行型产品经理会如何第一反应。"}
      1: {label: "1分", required_checks: [p6_reaction_case_specific], observable_rule: "只写出 P6+ 第一反应。"}
      2: {label: "2分", required_checks: [p6_reaction_case_specific, p6_valid_part_explained, p6_limit_explained], observable_rule: "能说明这个反应对在哪里、为什么不够。"}
      3: {label: "3分", required_checks: [p6_reaction_case_specific, p6_valid_part_explained, p6_limit_explained, p7_start_question_changes_analysis_path, downstream_effect_explained], observable_rule: "同时写出 P7+ 起手问题，并说明它如何改变后续分析路径。"}
    bad_patterns: ["只说不能停留表面但不写第一反应。", "把 P6+ 反应直接判错，没有说明它的合理性。"]
    full_score_requires: ["P6+ 反应、合理性、不足、P7+ 起手问题都必须出现。", "必须说明这个起手问题如何影响后续分析对象或方法。"]
    cannot_score_above:
      - {max_score: 1, when: "没有 p6_valid_part_explained。"}
      - {max_score: 2, when: "没有 downstream_effect_explained。"}

  thinking.problem_reframing:
    item_name: "问题重构"
    primary_account: thinking_depth
    level: A
    max_score: 5
    objective_checks: [surface_problem_identified_from_case, deeper_problem_reframed_from_surface, why_surface_insufficient, case_fact_supports_reframe, action_implication_derived, alternative_reframe_rejected]
    score_anchors:
      0: {label: "0分", required_checks: [], failure_if: "缺少 surface_problem_identified_from_case 和 deeper_problem_reframed_from_surface", observable_rule: "只复述事件，没有问题重构。"}
      1: {label: "1分", required_checks: [surface_problem_identified_from_case], observable_rule: "只命名表层问题。"}
      2: {label: "2分", required_checks: [surface_problem_identified_from_case, deeper_problem_reframed_from_surface], observable_rule: "提出更深问题，但没有解释为什么。"}
      3: {label: "3分", required_checks: [surface_problem_identified_from_case, deeper_problem_reframed_from_surface, why_surface_insufficient], observable_rule: "说明表层问题为什么不够。"}
      4: {label: "4分", required_checks: [surface_problem_identified_from_case, deeper_problem_reframed_from_surface, why_surface_insufficient, case_fact_supports_reframe], observable_rule: "用 case 事实支撑重构。"}
      5: {label: "5分", required_checks: [surface_problem_identified_from_case, deeper_problem_reframed_from_surface, why_surface_insufficient, case_fact_supports_reframe, action_implication_derived, alternative_reframe_rejected], observable_rule: "重构能导向行动取舍，并排除一个替代重构。"}
    bad_patterns: ["只写“本质是效率/信任/成本”。", "没有说明重构后要改变什么判断。"]
    full_score_requires: ["必须有这不是 X 而是 Y 的结构。", "必须说明重构如何改变后续取舍。"]
    cannot_score_above:
      - {max_score: 2, when: "没有 why_surface_insufficient。"}
      - {max_score: 4, when: "没有 action_implication_derived。"}

  thinking.eightq_reasoning_validity:
    item_name: "8 问推理有效性"
    primary_account: thinking_depth
    level: S
    max_score: 6
    objective_checks: [eight_questions_complete_shell, valid_question_count_ge_7, each_question_has_purpose, each_question_has_method, each_question_has_why_method, each_question_has_derivation, stage_conclusion_missing_le_1, next_step_impact_missing_le_1, continuity_edges_ge_5, vague_answer_count_le_1, boilerplate_count_le_1]
    score_anchors:
      0: {label: "0分", required_checks: [], failure_if: "缺少 eight_questions_complete_shell", observable_rule: "8 问不存在或只是标题。"}
      1: {label: "1分", required_checks: [eight_questions_complete_shell], observable_rule: "有 8 问外壳，但有效字段不足。"}
      2: {label: "2分", required_checks: [eight_questions_complete_shell, valid_question_count_ge_7, each_question_has_purpose], observable_rule: "至少 7 问有内容，并写明目的。"}
      3: {label: "3分", required_checks: [eight_questions_complete_shell, valid_question_count_ge_7, each_question_has_purpose, each_question_has_method, each_question_has_why_method], observable_rule: "多数问题包含目的、方法和为什么用。"}
      4: {label: "4分", required_checks: [eight_questions_complete_shell, valid_question_count_ge_7, each_question_has_purpose, each_question_has_method, each_question_has_why_method, each_question_has_derivation, stage_conclusion_missing_le_1], observable_rule: "有推导过程，阶段结论缺失不超过 1 处。"}
      5: {label: "5分", required_checks: [eight_questions_complete_shell, valid_question_count_ge_7, each_question_has_purpose, each_question_has_method, each_question_has_why_method, each_question_has_derivation, stage_conclusion_missing_le_1, next_step_impact_missing_le_1, continuity_edges_ge_5], observable_rule: "形成至少 5 处连续推进关系。"}
      6: {label: "6分", required_checks: [eight_questions_complete_shell, valid_question_count_ge_7, each_question_has_purpose, each_question_has_method, each_question_has_why_method, each_question_has_derivation, stage_conclusion_missing_le_1, next_step_impact_missing_le_1, continuity_edges_ge_5, vague_answer_count_le_1, boilerplate_count_le_1], observable_rule: "字段完整、连续推进、空泛和套话数量均不超过 1。"}
    bad_patterns: ["每问都写相同套话。", "只有目录卡片没有推导。"]
    full_score_requires: ["有效问数不少于 7/8。", "连续推进关系不少于 5 处。"]
    cannot_score_above:
      - {max_score: 0, when: "没有 eight_questions_complete_shell。"}
      - {max_score: 2, when: "valid_question_count_ge_7 不成立。"}
      - {max_score: 3, when: "continuity_edges_ge_5 不成立。"}

  thinking.causal_mechanism:
    item_name: "因果机制"
    primary_account: thinking_depth
    level: S
    max_score: 7
    objective_checks: [cause_variables_case_specific_and_directional, result_variables_case_specific_and_measurable, mediator_variables_explain_transmission, mechanism_chain_ge_3_steps, push_force_case_specific, resistance_case_specific, feedback_loop_closes_system, counter_mechanism_considered, validation_signal_observable]
    score_anchors:
      0: {label: "0分", required_checks: [], failure_if: "缺少 cause_variables_case_specific_and_directional", observable_rule: "只描述现象，没有原因变量。"}
      1: {label: "1分", required_checks: [cause_variables_case_specific_and_directional], observable_rule: "只命名原因变量。"}
      2: {label: "2分", required_checks: [cause_variables_case_specific_and_directional, result_variables_case_specific_and_measurable], observable_rule: "写出原因和结果，但没有中介变量。"}
      3: {label: "3分", required_checks: [cause_variables_case_specific_and_directional, result_variables_case_specific_and_measurable, mediator_variables_explain_transmission], observable_rule: "写出中介变量，但传导链少于 3 步。"}
      4: {label: "4分", required_checks: [cause_variables_case_specific_and_directional, result_variables_case_specific_and_measurable, mediator_variables_explain_transmission, mechanism_chain_ge_3_steps], observable_rule: "形成至少 3 步变量传导链。"}
      5: {label: "5分", required_checks: [cause_variables_case_specific_and_directional, result_variables_case_specific_and_measurable, mediator_variables_explain_transmission, mechanism_chain_ge_3_steps, push_force_case_specific, resistance_case_specific], observable_rule: "同时写出推力和阻力。"}
      6: {label: "6分", required_checks: [cause_variables_case_specific_and_directional, result_variables_case_specific_and_measurable, mediator_variables_explain_transmission, mechanism_chain_ge_3_steps, push_force_case_specific, resistance_case_specific, feedback_loop_closes_system, counter_mechanism_considered], observable_rule: "包含反馈回路和反向机制。"}
      7: {label: "7分", required_checks: [cause_variables_case_specific_and_directional, result_variables_case_specific_and_measurable, mediator_variables_explain_transmission, mechanism_chain_ge_3_steps, push_force_case_specific, resistance_case_specific, feedback_loop_closes_system, counter_mechanism_considered, validation_signal_observable], observable_rule: "机制链能落到可验证信号。"}
    bad_patterns: ["把相关性当因果。", "只说成本下降会带来更多应用。"]
    full_score_requires: ["必须有至少 3 步变量链。", "必须有推力、阻力、反馈或反向机制、验证信号。"]
    cannot_score_above:
      - {max_score: 2, when: "没有 mediator_variables_explain_transmission。"}
      - {max_score: 4, when: "没有 resistance_case_specific。"}

  thinking.system_relation_value_flow:
    item_name: "系统关系与价值流"
    primary_account: thinking_depth
    level: A
    max_score: 5
    objective_checks: [relevant_stakeholders_complete, irrelevant_stakeholder_padding_absent, stakeholder_roles_relevant_to_case, stakeholder_incentives_explained, stakeholder_constraints_explained, value_flow_source_target_explained, control_point_shift_explained, cost_bearer_identified, beneficiary_identified]
    score_anchors:
      0: {label: "0分", required_checks: [], failure_if: "缺少 relevant_stakeholders_complete", observable_rule: "没有系统参与方。"}
      1: {label: "1分", required_checks: [relevant_stakeholders_complete], observable_rule: "列出至少 4 个参与方。"}
      2: {label: "2分", required_checks: [relevant_stakeholders_complete, stakeholder_roles_relevant_to_case], observable_rule: "说明参与方角色。"}
      3: {label: "3分", required_checks: [relevant_stakeholders_complete, stakeholder_roles_relevant_to_case, stakeholder_incentives_explained, stakeholder_constraints_explained], observable_rule: "说明参与方激励和约束。"}
      4: {label: "4分", required_checks: [relevant_stakeholders_complete, stakeholder_roles_relevant_to_case, stakeholder_incentives_explained, stakeholder_constraints_explained, value_flow_source_target_explained, control_point_shift_explained], observable_rule: "说明价值流向和控制点变化。"}
      5: {label: "5分", required_checks: [relevant_stakeholders_complete, irrelevant_stakeholder_padding_absent, stakeholder_roles_relevant_to_case, stakeholder_incentives_explained, stakeholder_constraints_explained, value_flow_source_target_explained, control_point_shift_explained, cost_bearer_identified, beneficiary_identified], observable_rule: "明确谁承担成本、谁获得收益，且没有为凑数加入无关参与方。"}
    bad_patterns: ["只列利益相关者名单。", "没有价值从谁流向谁。"]
    full_score_requires: ["参与方、激励、约束、价值流、控制点必须出现。", "必须说明成本承担者和收益获得者。"]
    cannot_score_above:
      - {max_score: 2, when: "没有 stakeholder_incentives_explained。"}
      - {max_score: 3, when: "没有 value_flow_source_target_explained。"}

  thinking.counterfactual_boundary:
    item_name: "反事实、边界条件与失败条件"
    primary_account: thinking_depth
    level: A
    max_score: 5
    objective_checks: [plausible_alternative_judgment_explained, why_alternative_may_be_true, dependency_assumptions_explicit, invalidating_variable_explicit, failure_condition_explicit, validation_test_executable, decision_change_rule_explicit]
    score_anchors:
      0: {label: "0分", required_checks: [], failure_if: "缺少 plausible_alternative_judgment_explained", observable_rule: "没有反面判断。"}
      1: {label: "1分", required_checks: [plausible_alternative_judgment_explained], observable_rule: "只命名一个替代判断。"}
      2: {label: "2分", required_checks: [plausible_alternative_judgment_explained, why_alternative_may_be_true], observable_rule: "说明替代判断为什么可能成立。"}
      3: {label: "3分", required_checks: [plausible_alternative_judgment_explained, why_alternative_may_be_true, dependency_assumptions_explicit], observable_rule: "列出当前判断依赖的前提。"}
      4: {label: "4分", required_checks: [plausible_alternative_judgment_explained, why_alternative_may_be_true, dependency_assumptions_explicit, invalidating_variable_explicit, failure_condition_explicit], observable_rule: "说明哪个变量变化会让判断失效。"}
      5: {label: "5分", required_checks: [plausible_alternative_judgment_explained, why_alternative_may_be_true, dependency_assumptions_explicit, invalidating_variable_explicit, failure_condition_explicit, validation_test_executable, decision_change_rule_explicit], observable_rule: "给出验证测试和结论改变规则。"}
    bad_patterns: ["把风险清单当反事实。", "只说需要观察。"]
    full_score_requires: ["必须有替代判断、依赖前提、失效变量。", "必须有验证测试和决策改变规则。"]
    cannot_score_above:
      - {max_score: 2, when: "没有 dependency_assumptions_explicit。"}
      - {max_score: 4, when: "没有 validation_test_executable。"}

  thinking.trend_projection:
    item_name: "趋势阶段推演"
    primary_account: thinking_depth
    level: A
    max_score: 4
    objective_checks: [current_stage_evidence_based, phase1_triggered_state, phase2_triggered_state, long_term_state_specific, trigger_for_each_phase, observable_signal_for_each_phase, opportunity_change_by_phase]
    score_anchors:
      0: {label: "0分", required_checks: [], failure_if: "缺少 current_stage_evidence_based", observable_rule: "没有趋势阶段。"}
      1: {label: "1分", required_checks: [current_stage_evidence_based], observable_rule: "只写当前状态。"}
      2: {label: "2分", required_checks: [current_stage_evidence_based, phase1_triggered_state, phase2_triggered_state], observable_rule: "有阶段 1 和阶段 2。"}
      3: {label: "3分", required_checks: [current_stage_evidence_based, phase1_triggered_state, phase2_triggered_state, long_term_state_specific, trigger_for_each_phase], observable_rule: "有长期形态和每阶段触发条件。"}
      4: {label: "4分", required_checks: [current_stage_evidence_based, phase1_triggered_state, phase2_triggered_state, long_term_state_specific, trigger_for_each_phase, observable_signal_for_each_phase, opportunity_change_by_phase], observable_rule: "每阶段都有可观察信号和机会变化。"}
    bad_patterns: ["只写未来会增长。", "阶段只有标题没有触发条件。"]
    full_score_requires: ["必须有现在、阶段 1、阶段 2、长期形态。", "必须有触发条件、观察信号和机会变化。"]
    cannot_score_above:
      - {max_score: 2, when: "没有 long_term_state_specific。"}
      - {max_score: 3, when: "没有 observable_signal_for_each_phase。"}

  thinking.final_tradeoff_validation:
    item_name: "最终取舍与验证路径"
    primary_account: thinking_depth
    level: S
    max_score: 5
    objective_checks: [recommended_action_specific, avoided_action_specific, validation_first_action_specific, key_assumption_testable, validation_metric_measurable, smallest_path_executable, material_risk_identified, decision_rule_explicit]
    score_anchors:
      0: {label: "0分", required_checks: [], failure_if: "缺少 recommended_action_specific", observable_rule: "没有最终行动判断。"}
      1: {label: "1分", required_checks: [recommended_action_specific], observable_rule: "只有建议做什么。"}
      2: {label: "2分", required_checks: [recommended_action_specific, avoided_action_specific], observable_rule: "写出做和不做。"}
      3: {label: "3分", required_checks: [recommended_action_specific, avoided_action_specific, validation_first_action_specific, key_assumption_testable], observable_rule: "写出先验证和关键假设。"}
      4: {label: "4分", required_checks: [recommended_action_specific, avoided_action_specific, validation_first_action_specific, key_assumption_testable, validation_metric_measurable, smallest_path_executable], observable_rule: "写出验证指标和最小路径。"}
      5: {label: "5分", required_checks: [recommended_action_specific, avoided_action_specific, validation_first_action_specific, key_assumption_testable, validation_metric_measurable, smallest_path_executable, material_risk_identified, decision_rule_explicit], observable_rule: "写出风险和验证后如何改变决策。"}
    bad_patterns: ["只写值得关注。", "把方案列表当取舍。"]
    full_score_requires: ["做、不做、先验证必须同时出现。", "必须有指标、最小路径、风险和决策规则。"]
    cannot_score_above:
      - {max_score: 2, when: "没有 validation_first_action_specific。"}
      - {max_score: 4, when: "没有 decision_rule_explicit。"}

  thinking.method_insight_generation:
    item_name: "分析方法产生洞察"
    primary_account: thinking_depth
    level: A
    max_score: 5
    objective_checks: [method_chosen_and_specific, why_method_used, dimensions_analyzed, derivation_shown, method_finding_derived, judgment_changed_by_method, method_removed_would_weaken_insight]
    score_anchors:
      0: {label: "0分", required_checks: [], failure_if: "缺少 method_chosen_and_specific", observable_rule: "没有分析方法或只有空标题。"}
      1: {label: "1分", required_checks: [method_chosen_and_specific], observable_rule: "只出现方法名。"}
      2: {label: "2分", required_checks: [method_chosen_and_specific, why_method_used], observable_rule: "说明为什么用这个方法。"}
      3: {label: "3分", required_checks: [method_chosen_and_specific, why_method_used, dimensions_analyzed, derivation_shown], observable_rule: "展示分析维度和推导过程。"}
      4: {label: "4分", required_checks: [method_chosen_and_specific, why_method_used, dimensions_analyzed, derivation_shown, method_finding_derived, judgment_changed_by_method], observable_rule: "方法产生发现并改变判断。"}
      5: {label: "5分", required_checks: [method_chosen_and_specific, why_method_used, dimensions_analyzed, derivation_shown, method_finding_derived, judgment_changed_by_method, method_removed_would_weaken_insight], observable_rule: "能证明删除该方法会削弱 Insight。"}
    bad_patterns: ["堆砌方法名。", "方法删掉后不影响结论。"]
    full_score_requires: ["必须有方法、使用原因、维度、推导、发现。", "必须说明方法如何改变判断。"]
    cannot_score_above:
      - {max_score: 1, when: "没有 why_method_used。"}
      - {max_score: 3, when: "没有 judgment_changed_by_method。"}

  content.fact_support_core_claim:
    item_name: "核心判断事实支撑"
    primary_account: content_quality
    level: S
    max_score: 8
    objective_checks: [core_claim_count_1_to_3, each_core_claim_has_source_object, source_has_title_url_accessed_at, fact_confidence_a_or_b, c_or_d_not_used_for_core_claim, supporting_fact_matches_claim, supports_claim_how_explained, unsupported_parts_disclosed, source_is_primary_when_available, claim_boundary_affects_decision]
    score_anchors:
      0: {label: "0分", required_checks: [], failure_if: "缺少 core_claim_count_1_to_3", observable_rule: "没有核心判断证据绑定。"}
      1: {label: "1分", required_checks: [core_claim_count_1_to_3], observable_rule: "有核心判断，但没有 source object。"}
      2: {label: "2分", required_checks: [core_claim_count_1_to_3, each_core_claim_has_source_object], observable_rule: "每个核心判断有 source object，但字段不完整。"}
      3: {label: "3分", required_checks: [core_claim_count_1_to_3, each_core_claim_has_source_object, source_has_title_url_accessed_at], observable_rule: "来源对象有 title、url、accessed_at。"}
      4: {label: "4分", required_checks: [core_claim_count_1_to_3, each_core_claim_has_source_object, source_has_title_url_accessed_at, fact_confidence_a_or_b, c_or_d_not_used_for_core_claim], observable_rule: "核心判断不用 C/D 事实支撑。"}
      5: {label: "5分", required_checks: [core_claim_count_1_to_3, each_core_claim_has_source_object, source_has_title_url_accessed_at, fact_confidence_a_or_b, c_or_d_not_used_for_core_claim, supporting_fact_matches_claim], observable_rule: "supporting fact 与 claim 对应。"}
      6: {label: "6分", required_checks: [core_claim_count_1_to_3, each_core_claim_has_source_object, source_has_title_url_accessed_at, fact_confidence_a_or_b, c_or_d_not_used_for_core_claim, supporting_fact_matches_claim, supports_claim_how_explained], observable_rule: "写明事实如何支撑判断。"}
      7: {label: "7分", required_checks: [core_claim_count_1_to_3, each_core_claim_has_source_object, source_has_title_url_accessed_at, fact_confidence_a_or_b, c_or_d_not_used_for_core_claim, supporting_fact_matches_claim, supports_claim_how_explained, unsupported_parts_disclosed, source_is_primary_when_available], observable_rule: "标注未支撑部分，并优先使用一手来源。"}
      8: {label: "8分", required_checks: [core_claim_count_1_to_3, each_core_claim_has_source_object, source_has_title_url_accessed_at, fact_confidence_a_or_b, c_or_d_not_used_for_core_claim, supporting_fact_matches_claim, supports_claim_how_explained, unsupported_parts_disclosed, source_is_primary_when_available, claim_boundary_affects_decision], observable_rule: "证据边界会影响最终判断或取舍。"}
    bad_patterns: ["AI HOT 或媒体摘要直接当最终事实。", "有来源表但没有 supports_claim_how。"]
    full_score_requires: ["核心判断必须由 A/B 事实支撑。", "必须有 source object 和 unsupported_parts。"]
    cannot_score_above:
      - {max_score: 2, when: "核心判断依赖 C/D 事实。"}
      - {max_score: 5, when: "没有 supports_claim_how_explained。"}

  content.source_traceability:
    item_name: "来源可追溯性"
    primary_account: content_quality
    level: A
    max_score: 5
