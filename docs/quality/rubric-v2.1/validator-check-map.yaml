version: '2.1'
purpose: Separates deterministic validators, heuristic checks, LLM review, and user-only
  judgment.
check_types:
- machine_check
- heuristic_check
- llm_review
- human_review
checks:
  deep_case_count:
    check_type: machine_check
    owner: markdown_validator
    description: Daily training must contain exactly 3 deep cases.
    failure_type: CASE_DEPTH_IMBALANCE
  required_section_presence:
    check_type: machine_check
    owner: markdown_validator
    description: Required modules such as Insight, 8问, 方法工作台, PREP, SCQA, Asset Card
      must exist.
    failure_type: INCOMPLETE_8Q_FIELDS
  eightq_question_count:
    check_type: machine_check
    owner: markdown_validator
    description: 8问 must contain 8 questions.
    failure_type: EMPTY_8Q_REASONING
  eightq_field_presence:
    check_type: machine_check
    owner: markdown_validator
    description: Each valid 8问 item must include purpose, method, why, derivation,
      stage conclusion, and next-step impact.
    failure_type: INCOMPLETE_8Q_FIELDS
  html_core_content_preserved:
    check_type: machine_check
    owner: html_validator
    description: Rendered HTML must retain core Markdown content and cannot contain
      empty reasoning shells.
    failure_type: HTML_CONTENT_LOSS
  formula_consistency:
    check_type: machine_check
    owner: reviewer_output_validator
    description: Reviewer score lifecycle and account totals must be mathematically
      consistent.
    failure_type: REVIEWER_OUTPUT_INVALID
  repeated_answer_density:
    check_type: heuristic_check
    owner: reviewer_output_validator
    description: Detect repeated, template-like answers across 8问 fields.
    failure_type: BOILERPLATE_REASONING
  vague_answer_count:
    check_type: heuristic_check
    owner: reviewer_output_validator
    description: Flag vague answers that do not name case-specific variables.
    failure_type: BOILERPLATE_REASONING
  evidence_source_traceability:
    check_type: heuristic_check
    owner: source_validator
    description: Check whether source objects include title, url, source_type, accessed_at,
      and confidence.
    failure_type: SOURCE_UNTRACEABLE
  eightq_chain_continuity:
    check_type: llm_review
    owner: independent_reviewer
    description: Judge whether the 8问 answers form a continuous reasoning chain rather
      than isolated notes.
    failure_type: DISCONNECTED_8Q_CHAIN
  method_generates_insight:
    check_type: llm_review
    owner: independent_reviewer
    description: Judge whether analysis methods changed or deepened the final judgment.
    failure_type: METHOD_NO_INSIGHT
  causal_mechanism_strength:
    check_type: llm_review
    owner: independent_reviewer
    description: Judge whether variables explain how and why the case changes product/business
      outcomes.
    failure_type: WEAK_CAUSAL_CHAIN
  counterfactual_boundary_quality:
    check_type: llm_review
    owner: independent_reviewer
    description: Judge whether the case explains when the judgment would fail or need
      revision.
    failure_type: NO_COUNTERFACTUAL_BOUNDARY
  prep_scqa_usability:
    check_type: llm_review
    owner: independent_reviewer
    description: Judge whether PREP/SCQA can be used in interview or report settings.
    failure_type: PREP_NOT_USABLE
  career_asset_preference:
    check_type: human_review
    owner: user_quality_owner
    description: Only the user decides whether a case fits their personal growth and
      career moat.
    failure_type: USER_REVIEW_REQUIRED
  severe_bad_case_closure:
    check_type: human_review
    owner: user_quality_owner
    description: Only the user can close a severe Bad Case reported through Codex/browser
      comments.
    failure_type: USER_REVIEW_REQUIRED
